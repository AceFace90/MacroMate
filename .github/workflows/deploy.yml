name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web
        run: npx expo export --platform web

      - name: Fix asset paths for GitHub Pages subdirectory
        run: |
          sed -i 's|"/_expo/|"/MacroMate/_expo/|g' dist/index.html
          sed -i 's|src="/_expo/|src="/MacroMate/_expo/|g' dist/index.html

          IONICONS_FILE=$(find dist/assets -name "Ionicons.*.ttf" | head -1 | sed 's|dist/||')
          if [ -n "$IONICONS_FILE" ]; then
            FONT_CSS="<style>@font-face{font-family:'Ionicons';src:url('/MacroMate/${IONICONS_FILE}') format('truetype');font-weight:normal;font-style:normal;}</style>"
            sed -i "s|</head>|${FONT_CSS}</head>|" dist/index.html
          fi

          # PWA manifest + mobile meta tags
          cp public/manifest.json dist/manifest.json
          cp assets/icon-192.png dist/assets/icon-192.png 2>/dev/null || true
          cp assets/icon-512.png dist/assets/icon-512.png 2>/dev/null || true

          META_TAGS='<link rel="manifest" href="/MacroMate/manifest.json"><meta name="mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="apple-mobile-web-app-title" content="MacroMate"><link rel="apple-touch-icon" href="/MacroMate/assets/icon-192.png"><meta name="theme-color" content="#1a1a1a">'
          sed -i "s|</head>|${META_TAGS}</head>|" dist/index.html

          cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
